buildscript {
    repositories {
        mavenCentral()
        maven { url = "https://maven.minecraftforge.net/" }
    }
    dependencies {
        classpath group: "net.minecraftforge.gradle", name: "ForgeGradle", version: "5.1.+"
    }
}

apply plugin: "java"
apply plugin: "net.minecraftforge.gradle"

java.toolchain.languageVersion = JavaLanguageVersion.of(8)
compileJava {
    sourceCompatibility = "8"
    targetCompatibility = "8"
}

version = "1.12.2-1"
group = "gwydion0917.gwycraft"
archivesBaseName = "gwycraft"

repositories {
}

minecraft {
    mappings channel: "snapshot", version: "20171003-1.12"

    runs {
        "client" {
            workingDirectory file("./run")
            mods { gwycraft { source sourceSets.main } }
        }
        "server" {
            workingDirectory file("./run/server")
            mods { gwycraft { source sourceSets.main } }
        }
    }
}

dependencies {
    minecraft "net.minecraftforge:forge:1.12.2-14.23.5.2864"
}

processResources {
    inputs.property "version", project.version
    inputs.property "mcversion", "1.12.2"

    filesMatching("mcmod.info") {
        expand "version": project.version, "mcversion": "1.12.2"
    }
}

jar {
    // Exclude the Side.java shim — it's only needed at dev runtime to shadow Forge's
    // Side enum that snapshot_20171003 mappings expose with a phantom BUKKIT constant.
    exclude 'net/minecraftforge/**'
}

// Forge 1.12 expects resources and classes in the same directory
sourceSets.all { it.output.resourcesDir = it.output.classesDirs.getFiles().iterator().next() }
